type Query {
    publishedRecipes(filters: RecipesFilterInput): [Recipe!]!
    recipe(id: ID!): Recipe
    myRecipes: [Recipe!]!
    mySavedRecipes: [Recipe!]!
}

type Mutation {
    createRecipe(input: CreateRecipeInput!): Recipe!
    updateRecipe(id: ID!, input: UpdateRecipeInput!): Recipe!
    deleteRecipe(id: ID!): Boolean!
    favoriteRecipe(id: ID!): Boolean!
    unfavoriteRecipe(id: ID!): Boolean!
}

input RecipesFilterInput {
    name: [String!]
    maxPrepTimeMinutes: Int
    maxCookTimeMinutes: Int
    ingredient: [String!]
    authorUsername: [String!]
}

type Recipe {
    id: ID!
    authorId: ID!
    authorUsername: String!
    name: String!
    prepTimeMinutes: Int!
    cookTimeMinutes: Int!
    ingredients: [String!]!
    directions: String!
    published: Boolean!
    createdAt: String!
}

input CreateRecipeInput {
    name: String!
    prepTimeMinutes: Int!
    cookTimeMinutes: Int!
    ingredients: [String!]!
    directions: String!
    published: Boolean
}

input UpdateRecipeInput {
    name: String
    prepTimeMinutes: Int
    cookTimeMinutes: Int
    ingredients: [String!]
    directions: String
    published: Boolean
}
