type Query {
    # get all jobs for now, add filtering later
    getJobs(userId: ID!, filters: JobsFilterInputs): [Job!]!
}

input JobsFilterInputs {
    title: [String]
    company: [String]
    location: [String]
    status: [StatusEnum]
}


type Job {
    id: ID!
    creationTime: Int!
    company: String!
    title: String!
    location: String!
    listingUrl: String!
    listingDate: Int!
    description: String!
    notes: [Note!]!
    statusHistory: [StatusChange!]!
    status: StatusEnum!
}

type Note {
    id: ID!
    jobId: ID!
    content: String!
    timestamp: String!
}

enum StatusEnum {
    SAVED
    APPLIED
    CORRESPONDING
    INTERVIEWING
    OFFER_RECEIVED
    OFFER_ACCEPTED
    REJECTED
    STALE
    ARCHIVED
}

type StatusChange {
    date: String!
    status: StatusEnum!
}